name: Bulk Package Cleanup
on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete all but the latest version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Get all NuGet packages
          PACKAGES=$(gh api /user/packages?package_type=nuget --jq '.[].name')

          for PACKAGE in $PACKAGES; do
            echo "--- Processing package: $PACKAGE ---"
            
            # 2. Corrected JQ syntax: .[1:][].id 
            # The '|| echo ""' prevents the script from exiting if there is only 1 version
            OLD_VERSIONS=$(gh api "/user/packages/nuget/$PACKAGE/versions" --jq '.[1:][].id' 2>/dev/null || echo "")

            if [ -z "$OLD_VERSIONS" ]; then
              echo "Only one version found. Skipping deletion."
              continue
            fi

            for VERSION_ID in $OLD_VERSIONS; do
              echo "Deleting old version ID: $VERSION_ID"
              gh api --method DELETE "/user/packages/nuget/$PACKAGE/versions/$VERSION_ID"
            done
          done
