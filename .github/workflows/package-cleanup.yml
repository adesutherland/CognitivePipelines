name: Bulk Package Cleanup
on:
  schedule:
    - cron: '0 0 * * 0' # Runs once a week (Sunday at midnight)
  workflow_dispatch:   # Allows you to run it manually from the "Actions" tab

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete all but the latest version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Get a list of all NuGet packages for the user
          # Note: If this is an organization, change 'user' to 'org' and provide the org name
          PACKAGES=$(gh api /user/packages?package_type=nuget --jq '.[].name')

          for PACKAGE in $PACKAGES; do
            echo "Processing package: $PACKAGE"
            
            # 2. Get all version IDs for this package, sorted by date (newest first)
            # We skip the first one (the latest) and collect the IDs of the rest
            OLD_VERSIONS=$(gh api /user/packages/nuget/$PACKAGE/versions --jq '.[1:].id')

            for VERSION_ID in $OLD_VERSIONS; do
              echo "Deleting old version ID: $VERSION_ID"
              gh api --method DELETE /user/packages/nuget/$PACKAGE/versions/$VERSION_ID
            done
          done
